services:
  # Judge0 Code Execution API
  - type: web
    name: devkit-judge0
    env: docker
    dockerfilePath: ./Dockerfile.judge0
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    
    # Environment variables for Judge0
    envVars:
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        sync: false
      - key: POSTGRES_USER
        value: judge0
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: judge0
      - key: REDIS_URL
        value: redis://localhost:6379
    
    # Persistent disk for PostgreSQL data
    disk:
      name: judge0-postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    
    # Health check
    healthCheckPath: /
    
    # Auto-stop after 15 minutes of inactivity (free tier)
    # Note: Free tier services sleep after inactivity
